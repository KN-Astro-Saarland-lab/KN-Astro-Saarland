<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>KN Astro Saarland</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      background-image: url('Titelbild.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      filter: brightness(1.4) contrast(1.2);
    }

    /* Navigation */
    header {
      width: 100%;
      padding: 20px 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0));
      text-align: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
    }

    /* Titelbereich */
    .hero {
      margin-top: 140px;
      text-align: center;
      padding: 40px 20px;
      background: rgba(0,0,0,0.45);
      border-radius: 20px;
      width: 80%;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      backdrop-filter: blur(4px);
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 8px #000;
    }

    .hero p {
      font-size: 24px;
      margin-top: 0;
      text-shadow: 2px 2px 8px #000;
    }
