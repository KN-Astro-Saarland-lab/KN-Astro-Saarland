<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Kai Nimmrichter – Astrofotografie aus dem Saarland mit Teleskop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

    <!-- Kopfbereich mit Logo und Navigation -->
    <header class="topbar">
        <div class="logo">
            <img src="KN.png" alt="KN Logo">
        </div>
        <nav class="nav">
            <a href="#home">Home</a>
            <a href="#galerie">Galerie</a>
            <a href="#ueber">Über Mich</a>
            <a href="#sternwarte">Gartensternwarte</a>
            <a href="#ausruestung">Ausrüstung</a>
            <a href="#kontakt">Kontakt</a>
        </nav>
    </header>

    <!-- Titelbild mit Text -->
    <section id="home" class="hero">
        <div class="hero-inner">
            <h1>KAI NIMMRICHTER</h1>
            <h2>ASTROFOTOGRAFIE</h2>
            <h3>AUS DEM SAARLAND MIT TELESKOP</h3>
        </div>
    </section>

    <!-- Kachel-Bereich wie auf der alten Seite -->
    <section id="galerie" class="tiles">

        <div class="tile">
            <img src="Nebel.png" alt="Nebel">
            <span>Nebel</span>
        </div>

        <div class="tile">
            <img src="Galaxien.png" alt="Galaxien">
            <span>Galaxien</span>
        </div>

        <div class="tile">
            <img src="Sternhaufen.png" alt="Sternhaufen">
            <span>Sternhaufen</span>
        </div>

        <div class="tile">
            <img src="Mond.png" alt="Mond">
            <span>Mond</span>
        </div>

        <div class="tile">
            <img src="Planeten.png" alt="Planeten">
            <span>Planeten</span>
        </div>

        <div class="tile">
            <img src="Kometen.png" alt="Kometen">
            <span>Kometen</span>
        </div>

    </section>

    <!-- Platzhalter-Sektionen für Navigation -->
    <section id="ueber"></section>
    <section id="sternwarte"></section>
    <section id="ausruestung"></section>
    <section id="kontakt"></section>

</div>

</body>
</html>
