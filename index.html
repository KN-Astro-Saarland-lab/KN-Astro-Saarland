<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Kai Nimmrichter – Astrofotografie</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <img src="KN.png" class="logo" alt="Logo">
    <nav class="nav">
        <a href="#home">Home</a>
        <a href="#galerie">Galerie</a>
        <a href="#ueber">Über Mich</a>
        <a href="#sternwarte">Gartensternwarte</a>
        <a href="#ausruestung">Ausrüstung</a>
        <a href="#kontakt">Kontakt</a>
    </nav>
</header>

<section id="home" class="hero">
    <div class="hero-text">
        <h1>KAI NIMMRICHTER</h1>
        <h2>ASTROFOTOGRAFIE</h2>
        <h3>AUS DEM SAARLAND MIT TELESKOP</h3>
    </div>
</section>

<section id="galerie" class="tiles">

    <div class="tile">
        <img src="Nebel.png" alt="Nebel">
        <span>Nebel</span>
    </div>

    <div class="tile">
        <img src="Galaxien.png" alt="Galaxien">
        <span>Galaxien</span>
    </div>

    <div class="tile">
        <img src="Sternhaufen.png" alt="Sternhaufen">
        <span>Sternhaufen</span>
    </div>

    <div class="tile">
        <img src="Mond.png" alt="Mond">
        <span>Mond</span>
    </div>

    <div class="tile">
        <img src="Planeten.png" alt="Planeten">
        <span>Planeten</span>
    </div>

    <div class="tile">
        <img src="Kometen.png" alt="Kometen">
        <span>Kometen</span>
    </div>

</section>

</body>
</html>
