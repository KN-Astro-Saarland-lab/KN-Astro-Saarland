<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>KN Astro Saarland</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      background-image: url('Titelbild.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* Navigation */
    header {
      width: 100%;
      padding: 20px 0;
      background: rgba(0,0,0,0.6);
      text-align: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
    }

    /* Titelbereich */
    .hero {
      margin-top: 140px;
      text-align: center;
      padding: 40px 20px;
      background: rgba(0,0,0,0.55);
      border-radius: 20px;
      width: 80%;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 8px #000;
    }

    .hero p {
      font-size: 24px;
      margin-top: 0;
      text-shadow: 2px 2px 8px #000;
    }

    /* Kategorien */
    .categories {
      margin: 60px auto;
      width: 90%;
      max-width: 1100px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
    }

    .cat {
      width: 320px;
      height: 180px;
      background-size: cover;
      background-position: center;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 2px 2px 6px #000;
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }

    .cat:hover {
      transform: scale(1.05);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      margin-top: 80px;
    }
  </style>
</head>

<body>

<header>

    <a href="ausruestung.html">Ausrüstung</a>
    <a href="kontakt.html">Kontakt</a>
  </nav>
</header>

<div class="hero">
  <h1>Kai Nimmrichter – Astrofotografie aus dem Saarland</h1>
  <p>Nebel • Galaxien • Sternhaufen • Mond • Planeten • Kometen</p>
</div>

<div class="categories">
  <a href="galerie.html"><div class="cat" style="background-image:url('Herznebel IC1805.png');">Nebel</div></a>
  <a href="galerie.html"><div class="cat" style="background-image:url('Adromeda m31.png');">Galaxien</div></a>
  <a href="galerie.html"><div class="cat" style="background-image:url('M44-Neu.png');">Sternhaufen</div></a>
  <a href="galerie.html"><div class="cat" style="background-image:url('Mond 1.png');">Mond</div></a>
  <a href="galerie.html"><div class="cat" style="background-image:url('Jupiter 3.9.2023.png');">Planeten</div></a>
  <a href="galerie.html"><div class="cat" style="background-image:url('Komet-neu.png');">Kometen</div></a>

</footer>

</html>
